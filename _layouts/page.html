---
layout: default
---
<article class="page-wrap {% if page.author_profile == false %}page-wrap--full{% endif %}">
  {% if page.author_profile != false %}
    {% include sidebar.html %}
  {% endif %}

  <div class="page-content">
    {% if page.title and page.show_title != false %}
      <header class="page-header">
        <h1 class="page-title">{{ page.title }}</h1>
        {% if page.subtitle %}<p class="page-subtitle">{{ page.subtitle }}</p>{% endif %}
      </header>
    {% endif %}

    <div class="page-body">
      {{ content }}
    </div>
  </div>
</article>
